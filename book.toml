[book]
authors = ["Jacob Reinhold"]
title = "Séminaire de Géométrie Algébrique du Bois-Marie — English"
description = "An English Markdown translation of the Grothendieck-era SGA seminars."
language = "en"
src = "."

[build]
build-dir = "book"
create-missing = false

# Render math to static HTML at build time (no client-side JS, no layout shift).
# Delimiters stay at their defaults — block $$..$$ and inline $..$ — matching how
# the SGA source authors math. throw-on-error=false keeps the build green if any
# span fails to parse; KaTeX renders that span inline in error-color instead of
# aborting. The SGA corpus uses no custom macros, so none are configured.
[preprocessor.katex]
error-color = "#b3261e"
throw-on-error = false

# Runs right after katex: two KaTeX glyphs are literal characters that mdBook's
# markdown parser then mis-reads — `~` (\tilde) as GFM strikethrough, and `\`
# (\backslash) as a backslash-escape that eats the span's closing tag. This
# HTML-encodes both so they render correctly. See the script.
[preprocessor.katex-md-fix]
after = ["katex"]
command = "python3 scripts/katex-md-fix.py"

[output.html]
git-repository-url = "https://github.com/jcreinhold/sga"
edit-url-template = "https://github.com/jcreinhold/sga/edit/main/{path}"
preferred-dark-theme = "coal"
additional-css = [
  "theme/custom/typography.css",
  "theme/custom/theorems.css",
  "theme/custom/footnotes.css",
  "theme/custom/print.css",
]
additional-js = [
  "theme/custom/theorems.js",
  "theme/custom/footnotes.js",
]

[output.html.search]
enable = true
limit-results = 25
use-boolean-and = true
