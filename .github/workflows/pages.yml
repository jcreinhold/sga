name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build from."
        type: string
        default: main
        required: true

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook@0.5.3

      - name: Check SUMMARY.md is up to date
        run: python3 scripts/generate-summary.py --check

      - name: Build site
        run: mdbook build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: book

      - id: deployment
        uses: actions/deploy-pages@v4
