name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to build from."
        type: string
        default: main
        required: true

concurrency:
  group: github-pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"
  # First mdbook-katex release built against mdbook 0.5 (mdbook-preprocessor
  # 0.5.1). Pre-release, so it must be pinned exactly — see Makefile.
  MDBOOK_KATEX_VERSION: "0.10.0-alpha"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.source_ref || github.ref }}

      - uses: taiki-e/install-action@v2
        with:
          tool: mdbook@${{ env.MDBOOK_VERSION }}

      # mdbook-katex 0.10.0-alpha has no prebuilt binary in install-action, and
      # it is a pre-release, so build it from crates.io with the version pinned.
      - name: Install mdbook-katex
        run: cargo install mdbook-katex --version "${MDBOOK_KATEX_VERSION}" --locked

      - name: Check SUMMARY.md is up to date
        run: python3 scripts/generate-summary.py --check

      - name: Build site
        # mdbook-katex 0.10.0-alpha (newest release, built against mdbook 0.5.1)
        # prints a benign cross-version WARN under the 0.5.3 we pin; quiet just
        # that preprocessor's sub-error logs. Real katex errors still surface.
        run: RUST_LOG=info,mdbook_katex=error mdbook build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: book

      - id: deployment
        uses: actions/deploy-pages@v4
