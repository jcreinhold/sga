# mdwright configuration
#
# Generated by `mdwright config init`. Every key below is set to
# mdwright's current default. Edit or delete values to fit this project.

[lint]
# Type: "default" | "all" | "none".
# Baseline lint rule set. Use `default` for curated defaults, `all` for every registered rule, or `none` with `lint.select` for an explicit set.
preset = "default"

# Type: array of string.
# Exact lint rule names to enable when `lint.preset = "none"`. Preset names are not valid rule names here.
select = []

# Type: array of string.
# Lint rule names to add on top of `lint.preset`.
extend-select = []

# Type: array of string.
# Lint rule names to remove after applying `lint.preset`, `lint.select`, and `lint.extend-select`.
ignore = []

# Type: array of string.
# Gitignore-style patterns. Matching files are dropped from lint runs. Patterns are anchored to the directory containing the config file.
exclude = []

[lint.info-strings]
# Type: array of string.
# Project-specific additions to the `info-string-typo` allowlist. The stdlib default allowlist still applies.
extra = []

[lint.render]
# Type: "mathjax-v3" | "katex".
# Math renderer the `math/render-compat` rule should check against.
renderer = "mathjax-v3"

# Type: array of string.
# Renderer packages/extensions to load on top of the renderer's default autoload set (e.g. `["mhchem", "physics"]`). Consumed by the `math/render-compat` rule.
packages = []

# Type: table.
# User-declared macros known to be in scope, keyed by command name (no leading backslash). Each entry is either `name = arity` or `name = { arity = N }`.
macros = {}

[fmt]
# Type: "preserve" | "mdformat".
# Formatter style profile. `preserve` keeps mdwright's identity-oriented defaults; `mdformat` applies mdformat-compatible defaults where verified rewrites can preserve semantics. Explicit `[fmt]` keys override profile defaults.
profile = "preserve"

# Type: "keep" | "no" | int.
# Wrap mode for prose paragraphs. `keep` leaves existing breaks alone; `no` forbids new breaks; an integer enforces that display-column budget for breakable lines in every formatter profile.
wrap = 120

# Type: "stable" | "balanced".
# Reflow strategy used when `fmt.wrap` is an integer. `stable` greedily fills soft-break runs and is the default; `balanced` rebalances paragraphs for more even line lengths.
wrap-strategy = "stable"

# Type: "asterisk" | "underscore" | "preserve".
# Italic delimiter canonicalisation. `preserve` leaves source bytes; `asterisk` or `underscore` opts into the post-pass rewrite. See [Style knobs](format/style.md).
italic = "preserve"

# Type: "asterisk" | "underscore" | "preserve".
# Strong-emphasis delimiter canonicalisation. Independent of `fmt.italic`: `*italic*` with `__strong__` is expressible.
strong = "preserve"

# Type: "dash" | "asterisk" | "plus" | "preserve".
# Unordered-list bullet canonicalisation. Each marker is rewritten through a marker-local fact and the family commits only after verification.
list-marker = "preserve"

# Type: "one" | "consistent" | "preserve".
# Ordered-list number canonicalisation. `one` rewrites markers to `1.` only when verification preserves the list start; `consistent` renumbers each list from the source's first item; `preserve` keeps source numbering verbatim.
ordered-list = "preserve"

# Type: "dash" | "asterisk" | "underscore" | "underscore-70" | "preserve".
# Thematic-break canonicalisation. Fixed character modes preserve the source repeat count and spacing; `underscore-70` rewrites the whole break line to mdformat's 70 underscores.
thematic-break = "preserve"

# Type: "preserve" | "strip" | "ensure" | bool.
# Trailing-newline policy at the document boundary. `true` is accepted as a synonym for `ensure` and `false` for `strip`.
trailing-newline = "preserve"

# Type: "lf" | "crlf" | "keep".
# Line-ending normalisation. `keep` adopts the first newline seen in the source.
end-of-line = "lf"

# Type: array of string.
# Formatter-specific exclude globs, independent of `[lint] exclude`.
exclude = []

# Type: "preserve" | "canonicalise".
# ATX heading `{#id .class key=val}` trailer emission. `preserve` emits the source trailer byte-verbatim. `canonicalise` emits id first, then classes, then key-value pairs.
heading-attrs = "preserve"

[fmt.refs]
# Type: "end" | "preserve".
# Where reference-link definitions are emitted: gathered and sorted at the end of the document, or kept in source order.
placement = "end"

# Type: "bare" | "angle" | "preserve".
# Destination style for reference-link and inline-link URLs. `preserve` keeps each destination's source form; `bare` strips wrapping `<...>` where the bare form still parses; `angle` wraps every destination in `<...>`.
style = "preserve"

[fmt.footnotes]
# Type: "end" | "preserve".
# Where footnote definitions are emitted. Default is `preserve` because pulldown-cmark's HTML renderer ties footnote position to parse order; moving definitions would change the rendered HTML.
placement = "preserve"

[fmt.tables]
# Type: "compact" | "align" | "preserve".
# GFM table spacing policy. `compact` trims cell padding to one space on each side; `align` pads columns by display width; `preserve` keeps source cell spacing.
style = "align"

[fmt.lists]
# Type: "marker-width" | "four-space".
# Continuation indentation for wrapped list-item paragraphs. `marker-width` aligns to the source marker width; `four-space` matches mdformat's list continuation spelling.
continuation-indent = "marker-width"

[fmt.frontmatter]
# Type: bool.
# Whether to emit document frontmatter byte-verbatim. `false` strips it.
preserve = true

[fmt.math]
# Type: bool.
# Whether whole-block math regions are normalised. Off by default because math bytes are opaque to CommonMark.
normalise = false

# Type: "none" | "commonmark-katex" | "dollar".
# Math delimiter rendering policy for downstream renderers. `none` preserves source math regions; `commonmark-katex` records intent without rewriting; `dollar` rewrites bracket and paren math to dollar delimiters.
render = "none"

[parse.math]
# Type: "tex" | "github".
# Math delimiter recognition policy. `tex` recognises `\(...\)`, `\[...\]`, and LaTeX environments; `github` also recognises `$...$` and `$$...$$`.
delimiters = "github"

[parse.extensions]
# Type: bool.
# Recognise `Term\n: definition\n` definition lists. Turn off on non-mkdocs corpora to suppress recognition.
definition-lists = true

# Type: bool.
# Recognise `*[ABBR]: definition` abbreviation declarations as a scan-and-preserve overlay. mdwright does not expand occurrences; the downstream renderer does.
abbreviation-lists = true

# Type: bool.
# Recognise `# Heading {#id .class}` trailers via pulldown's heading-attribute extension. When off, the trailer reads as plain text in the heading body.
heading-attribute-lists = true

# Type: bool.
# Recognise `{ .class }` on a line by itself after a non-empty block as a scan-and-preserve overlay. Inline attribute lists are out of scope.
block-attribute-lists = true

[parse.extensions.gfm]
# Type: "disabled" | "urls" | "urls-and-emails".
# Recognise GFM bare URL and email autolinks as document facts and render them as links. Use `urls` to leave bare emails as text or `disabled` for strict CommonMark-style text treatment.
autolinks = "urls-and-emails"

# Type: bool.
# Apply GFM tagfiltering when rendering or building semantic signatures. This escapes the raw HTML tags that cmark-gfm filters, without rewriting source bytes.
tagfilter = true

[parse.extensions.myst]
# Type: bool.
# Recognise MyST `:::{name}` directive containers with `:KEY: value` options as a scan-and-preserve overlay. mdwright does not expand directives; downstream renderers do.
directive-containers = true

# Type: bool.
# Recognise MyST `` {role}`payload` `` inline roles as a scan-and-preserve overlay inside paragraph text.
inline-roles = true

# Type: bool.
# Recognise MyST `{{name}}` inline substitution references as a scan-and-preserve overlay. Declarations live in YAML frontmatter and round-trip through the frontmatter path.
substitution-references = true

# Type: bool.
# Recognise MyST `%` line comments at line-start as a scan-and-preserve overlay.
comments = true

[parse.extensions.pandoc]
# Type: bool.
# Recognise Pandoc `::: {.cls}` fenced div openers. The closer is a colon-only line of matching count.
fenced-divs = true

# Type: bool.
# Recognise Pandoc `:::name` fenced div openers.
short-form-divs = true

# Type: bool.
# Recognise Pandoc `[content]{.cls}` inline attribute spans as a scan-and-preserve overlay.
inline-attribute-spans = true

[render]
# Type: "pulldown" | "cmark-gfm".
# HTML spelling profile for `mdwright render`. `pulldown` preserves the default renderer; `cmark-gfm` matches cmark-gfm spelling where parser semantics already agree.
profile = "pulldown"
